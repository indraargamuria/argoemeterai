services:
  postgres:
    image: postgres:15
    container_name: opexnow-postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: opexnow

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data


  minio:
    image: minio/minio
    container_name: opexnow-minio

    ports:
      - "9000:9000"
      - "9001:9001"

    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin

    command: server /data --console-address ":9001"

    volumes:
      - minio-data:/data


volumes:
  postgres-data:
  minio-data: